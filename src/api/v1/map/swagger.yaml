paths:
  /api/v1/map/:
    get:
      summary: Get navigation map
      description: Returns the static occupancy grid map. Frontend should cache this.
      responses:
        '200':
          description: Map data retrieved successfully
          content:
            application/json:
              example:
                status: "success"
                data:
                  frame: "map"
                  resolution: 0.05
                  width: 1000
                  height: 1000
                  origin: { x: -10.0, y: -10.0, yaw: 0 }
                  map: [0, 0, -1, 100, 0] # Example row-major array
                meta: { "timestamp": "2025-09-28T22:00:00Z" }