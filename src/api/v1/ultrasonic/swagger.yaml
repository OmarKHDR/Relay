openapi: 3.0.3
info:
  title: Ultrasonic Sensor API
  description: API for retrieving real-time distance measurements from ultrasonic sensors via ROS topics.
  version: 1.0.0

paths:
  /api/v1/sensors/ultrasonic:
    get:
      summary: Get current ultrasonic distance
      description: Retrieves the most recent distance measurement from the front ultrasonic sensor.
      responses:
        '200':
          description: Distance data retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UltrasonicResponse'
        '503':
          description: Service Unavailable - No distance data received from the sensor topic yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    UltrasonicResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              name:
                type: string
                example: "front ultrasonic"
              distance:
                type: number
                format: float
                description: Distance measurement in meters.
                example: 1.45
        meta:
          $ref: '#/components/schemas/Meta'

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: fail
        error:
          type: object
          properties:
            code:
              type: string
              example: NO_DATA
            type:
              type: string
              example: UnavailableError
            message:
              type: string
              example: Ultrasonic distance data not available at the moment.
        meta:
          $ref: '#/components/schemas/Meta'

    Meta:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-02-06T02:45:00Z"