openapi: 3.0.3
info:
  title: SANAD Smart Home API
  description: API to control and manage all the smart home devices connected to the network
  version: 1.0.0

paths:
  /api/v1/smart-home/discover:
    get:
      summary: Scan the network
      description: Get all devices connected to the network by using UDP broadcast.
      parameters:
        - in: query
          name: timeoutMs
          schema:
            type: integer
            minimum: 1
          description: Discovery timeout in milliseconds (clamped between 1-9999, default 400).
      responses:
        '200':
          description: Devices discovered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessDevicesMapResponse'

  /api/v1/smart-home/devices:
    get:
      summary: Get all devices
      responses:
        '200':
          description: All cached devices returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessDevicesMapResponse'

    post:
      summary: Register a new device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '200':
          description: Device registered. Returns entire devices map.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessDevicesMapResponse'

    patch:
      summary: Update existing device info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceInfoRequest'
      responses:
        '200':
          description: Device updated. Returns the updated single device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessSingleDeviceResponse'

  /api/v1/smart-home/devices/control:
    post:
      summary: Control a device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControlRequest'
      responses:
        '200':
          description: Device state changed. Returns the updated device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessSingleDeviceResponse'

  /api/v1/smart-home/devices/{id}/info:
    get:
      summary: Get device info from device hardware
      description: Fetches live info directly from the physical device over HTTP.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device info retrieved. Shape depends on the physical device response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessAnyResponse'

  /api/v1/smart-home/devices/{id}/room:
    patch:
      summary: Change device room
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeDeviceRoomRequest'
      responses:
        '200':
          description: Device room changed. Returns TypeORM UpdateResult.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessUpdateResultResponse'

  /api/v1/smart-home/devices/{id}:
    get:
      summary: Get a device by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Single device returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessSingleDeviceResponse'

    delete:
      summary: Delete a device
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessDeleteResponse'

components:
  schemas:
    Device:
      type: object
      description: In-memory device object (merged from DB + discovery data).
      properties:
        id:
          type: string
        name:
          type: string
        ip:
          type: string
        controlType:
          type: string
        state:
          type: integer
        connected:
          type: boolean
        position:
          type: string
          nullable: true
        room:
          type: object
          nullable: true
          properties:
            id:
              type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DevicesMap:
      type: object
      description: Object keyed by device id, each value is a Device.
      additionalProperties:
        $ref: '#/components/schemas/Device'

    SuccessDevicesMapResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/DevicesMap'

    SuccessSingleDeviceResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Device'

    SuccessDeleteResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            id:
              type: string
            deleted:
              type: boolean
              example: true

    SuccessAnyResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: Shape depends on the physical device response.

    SuccessUpdateResultResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: TypeORM UpdateResult.
          properties:
            generatedMaps:
              type: array
              items:
                type: object
            raw:
              type: array
              items:
                type: object
            affected:
              type: integer

    ControlRequest:
      type: object
      properties:
        id:
          type: string
        state:
          type: integer
          description: For binary controlType, must be 0 or 1.
      required:
        - id
        - state

    RegisterDeviceRequest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        control_type:
          type: string
        state:
          type: integer
        roomName:
          type: string
          description: Optional room name to associate the device with on registration.
      required:
        - id
        - name
        - control_type
        - state

    UpdateDeviceInfoRequest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    ChangeDeviceRoomRequest:
      type: object
      properties:
        roomId:
          type: string
      required:
        - roomId