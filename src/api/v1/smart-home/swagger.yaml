openapi: 3.0.3
info:
  title: SANAD Smart Home API
  description: API to discover, control, and manage smart home devices.
  version: 1.0.0

paths:
  /api/v1/smart-home/discover:
    get:
      summary: Scan the network
      description: Runs UDP discovery, stores newly discovered devices, marks missing devices disconnected, and returns all cached devices.
      parameters:
        - in: query
          name: timeoutMs
          schema:
            type: integer
            minimum: 1
            maximum: 9999
          description: Discovery timeout in milliseconds. Defaults to 4000; invalid values fall back to 400.
      responses:
        '200':
          description: Cached devices after discovery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicesMapResponse'

  /api/v1/smart-home/devices:
    get:
      summary: Get all devices
      responses:
        '200':
          description: All cached devices keyed by device id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicesMapResponse'
    post:
      summary: Register a new device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '200':
          description: Registered device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    patch:
      summary: Update existing device info
      description: Updates the stored name and forwards the name to the physical device API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceInfoRequest'
      responses:
        '200':
          description: Updated device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'

  /api/v1/smart-home/devices/control:
    post:
      summary: Control a device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControlRequest'
      responses:
        '200':
          description: Updated device, or false if the device is not cached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlDeviceResponse'

  /api/v1/smart-home/devices/{id}/info:
    get:
      summary: Get live device info
      description: Fetches live info directly from the physical device over HTTP.
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Physical device response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyResponse'

  /api/v1/smart-home/devices/{id}/room:
    patch:
      summary: Change device room
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeDeviceRoomRequest'
      responses:
        '200':
          description: TypeORM update result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateResultResponse'

  /api/v1/smart-home/devices/{id}:
    get:
      summary: Get a device by id
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device or null/undefined if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
    delete:
      summary: Delete a device
      description: Sends factory reset to the physical device, then deletes the cached DB record.
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Deletion result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteDeviceResponse'

components:
  parameters:
    DeviceId:
      in: path
      name: id
      required: true
      schema:
        type: string

  schemas:
    Device:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        ip:
          type: string
        control_type:
          type: string
        state:
          type: integer
        connected:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        room:
          type: object
          nullable: true
          properties:
            id:
              type: string

    DevicesMap:
      type: object
      description: Object keyed by device id.
      additionalProperties:
        $ref: '#/components/schemas/Device'

    RegisterDeviceRequest:
      type: object
      required:
        - device
      properties:
        device:
          type: object
          required:
            - id
            - name
            - control_type
            - state
          properties:
            id:
              type: string
            name:
              type: string
            control_type:
              type: string
              example: binary
            state:
              type: number
            roomName:
              type: string
              description: Optional room name to associate the device with on registration.

    UpdateDeviceInfoRequest:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string

    ControlRequest:
      type: object
      required:
        - id
        - state
      properties:
        id:
          type: string
        state:
          type: number
          description: For binary control_type devices, must be 0 or 1.

    ChangeDeviceRoomRequest:
      type: object
      required:
        - roomId
      properties:
        roomId:
          type: string

    DeleteResult:
      type: object
      properties:
        id:
          type: string
        deleted:
          type: boolean
          example: true

    TypeOrmUpdateResult:
      type: object
      properties:
        generatedMaps:
          type: array
          items:
            type: object
        raw:
          type: array
          items:
            type: object
        affected:
          type: integer

    Meta:
      type: object
      properties:
        timestamp:
          type: string

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data: {}
        meta:
          $ref: '#/components/schemas/Meta'

    DevicesMapResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DevicesMap'

    DeviceResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Device'

    ControlDeviceResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              oneOf:
                - $ref: '#/components/schemas/Device'
                - type: boolean
                  example: false

    DeleteDeviceResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DeleteResult'

    UpdateResultResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/TypeOrmUpdateResult'

    AnyResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              type: object
              description: Shape depends on the physical device response.

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        reason:
          type: string
        meta:
          type: object
          properties:
            timestamper:
              type: string

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid data
        details:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
