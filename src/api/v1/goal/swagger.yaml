openapi: 3.0.3
info:
  title: SANAD Goal API
  description: API for managing Nav2 goals through ROSLIB.
  version: 1.0.0

paths:
  /api/v1/goal:
    get:
      summary: Get current navigation goal
      description: Returns the plain local snapshot of the active ROSLIB goal.
      responses:
        '200':
          description: Active goal snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalSnapshotResponse'
        '500':
          description: No active goal or ROS/runtime error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Set a new navigation goal
      description: Sends a target pose to the Nav2 NavigateToPose action server.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetGoalRequest'
      responses:
        '200':
          description: Goal accepted by ROSLIB locally.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetGoalResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      summary: Cancel active goals
      description: Sends a zero UUID CancelGoal request to cancel all NavigateToPose goals, then clears the local active goal snapshot.
      responses:
        '200':
          description: Cancel request succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelGoalResponse'
        '500':
          description: ROS cancel service error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/goal/feedback:
    get:
      summary: Get current goal feedback
      responses:
        '200':
          description: Latest feedback event, or null if no feedback has been received.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalFeedbackResponse'

components:
  schemas:
    SetGoalRequest:
      type: object
      required:
        - x
        - y
        - yaw
      properties:
        x:
          type: number
        y:
          type: number
        yaw:
          type: number
          description: Rotation in radians.

    GoalSnapshot:
      type: object
      properties:
        goal_id:
          type: string
        frame_id:
          type: string
          example: map
        x:
          type: number
        y:
          type: number
        yaw:
          type: number
        status:
          type: object
          nullable: true
          description: Raw ROSLIB status event for the current goal.
        feedback:
          type: object
          nullable: true
          description: Latest raw Nav2 feedback event.
        result:
          type: object
          nullable: true
          description: Raw Nav2 result event.
        is_finished:
          type: boolean

    SetGoalResult:
      type: object
      properties:
        goalID:
          type: string

    CancelGoalResult:
      type: object
      properties:
        canceled:
          type: boolean
          example: true

    FeedbackResult:
      type: object
      properties:
        feedback:
          type: object
          nullable: true

    Meta:
      type: object
      properties:
        timestamp:
          type: string

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data: {}
        meta:
          $ref: '#/components/schemas/Meta'

    GoalSnapshotResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/GoalSnapshot'

    SetGoalResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SetGoalResult'

    CancelGoalResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CancelGoalResult'

    GoalFeedbackResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/FeedbackResult'

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        reason:
          type: string
        meta:
          type: object
          properties:
            timestamper:
              type: string

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid data
        details:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
