openapi: 3.0.3
info:
  title: Servo Motor API
  description: API for controlling and monitoring a primary servomotor via ROS topics.
  version: 1.0.0

paths:
  /api/v1/servo-motor:
    get:
      summary: Get current servo angle
      description: Retrieves the last known angle of the primary servomotor.
      responses:
        '200':
          description: Angle retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServoResponse'
        '503':
          description: Service Unavailable - Angle data not yet received from ROS.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Set servo angle
      description: Publishes a new target angle (0-180) to the servomotor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - angle
              properties:
                angle:
                  type: number
                  minimum: 0
                  maximum: 180
                  description: Target angle in degrees.
                  example: 90
      responses:
        '200':
          description: Angle command published successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServoResponse'
        '400':
          description: Invalid Input - Angle is not a number or out of range (0-180).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ServoResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              name:
                type: string
                example: "primary servomotor"
              angle:
                type: number
                example: 45
        meta:
          $ref: '#/components/schemas/Meta'

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: fail
        error:
          type: object
          properties:
            code:
              type: string
              example: INVALID_VALUE
            type:
              type: string
              example: ValueError
            message:
              type: string
              example: Angle must be between 0 and 180 (received 200)
        meta:
          $ref: '#/components/schemas/Meta'

    Meta:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-02-06T02:40:00Z"