openapi: 3.0.3
info:
  title: SANAD Room API
  description: API to manage rooms and navigate to stored room poses.
  version: 1.0.0

paths:
  /api/v1/room:
    get:
      summary: Get all rooms
      responses:
        '200':
          description: All cached rooms keyed by room id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomsMapResponse'
    post:
      summary: Register a new room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRoomRequest'
      responses:
        '200':
          description: Registered room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    patch:
      summary: Update existing room info
      description: Runtime expects the room id in the request body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomRequest'
      responses:
        '200':
          description: Updated room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'

  /api/v1/room/{id}:
    get:
      summary: Get a room by id
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Room or null/undefined if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
    delete:
      summary: Delete a room by id
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Deletion result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteRoomResponse'

  /api/v1/room/{id}/navigate:
    get:
      summary: Navigate robot to room
      description: Sends a Nav2 NavigateToPose goal using the room's stored pose.
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Navigation goal sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NavigateRoomResponse'

components:
  parameters:
    RoomId:
      in: path
      name: id
      required: true
      schema:
        type: string

  schemas:
    Room:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        min_x:
          type: number
        max_x:
          type: number
        min_y:
          type: number
        max_y:
          type: number
        theta:
          type: number
        pose_x:
          type: number
        pose_y:
          type: number
        pose_theta:
          type: number
        devices:
          type: array
          items:
            $ref: '#/components/schemas/Device'

    Device:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        control_type:
          type: string
        state:
          type: integer
        connected:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RoomsMap:
      type: object
      description: Object keyed by room id.
      additionalProperties:
        $ref: '#/components/schemas/Room'

    RegisterRoomRequest:
      type: object
      required:
        - id
        - name
        - min_x
        - max_x
        - min_y
        - max_y
        - theta
        - pose_x
        - pose_y
        - pose_theta
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        min_x:
          type: number
        max_x:
          type: number
        min_y:
          type: number
        max_y:
          type: number
        theta:
          type: number
        pose_x:
          type: number
        pose_y:
          type: number
        pose_theta:
          type: number
        devices:
          type: array
          items:
            type: object

    UpdateRoomRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        name:
          type: string
        min_x:
          type: number
        max_x:
          type: number
        min_y:
          type: number
        max_y:
          type: number
        theta:
          type: number
        pose_x:
          type: number
        pose_y:
          type: number
        pose_theta:
          type: number
        devices:
          type: array
          items:
            type: object

    NavigateRoomResult:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Navigating to room 24f6d9b4-7c44-4bd2-8d0e-62c7adfc35b7

    DeleteResult:
      type: object
      properties:
        id:
          type: string
        deleted:
          type: boolean
          example: true

    Meta:
      type: object
      properties:
        timestamp:
          type: string

    RoomsMapResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RoomsMap'

    RoomResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Room'

    DeleteRoomResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DeleteResult'

    NavigateRoomResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/NavigateRoomResult'

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data: {}
        meta:
          $ref: '#/components/schemas/Meta'

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        reason:
          type: string
        meta:
          type: object
          properties:
            timestamper:
              type: string

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid data
        details:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
